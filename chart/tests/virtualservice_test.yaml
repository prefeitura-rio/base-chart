suite: test istio virtual service
templates:
  - virtualservice.yaml
tests:
  - it: should not render when istio is disabled
    set:
      istio.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when istio is enabled
    set:
      istio.enabled: true
    asserts:
      - isKind:
          of: VirtualService
      - equal:
          path: metadata.name
          value: RELEASE-NAME-base-chart

  - it: should configure path-based routing when enabled
    set:
      istio.enabled: true
      istio.virtualService.pathBasedRouting.enabled: true
      istio.virtualService.pathBasedRouting.servicePath: "api"
    asserts:
      - equal:
          path: spec.http[0].match[0].uri.prefix
          value: "/api/"
      - equal:
          path: spec.http[0].rewrite.uri
          value: "/"

  - it: should configure canary deployment when enabled
    set:
      istio.enabled: true
      istio.virtualService.pathBasedRouting.enabled: true
      istio.virtualService.canary.enabled: true
      istio.virtualService.canary.weight: 20
    asserts:
      - equal:
          path: spec.http[0].route[0].weight
          value: 80
      - equal:
          path: spec.http[0].route[1].weight
          value: 20
      - equal:
          path: spec.http[0].route[1].destination.host
          value: RELEASE-NAME-base-chart-canary

  - it: should configure custom hosts when specified
    set:
      istio.enabled: true
      istio.virtualService.hosts:
        - api.example.com
        - internal.mesh.local
    asserts:
      - contains:
          path: spec.hosts
          content: api.example.com
      - contains:
          path: spec.hosts
          content: internal.mesh.local

  - it: should configure gateways when specified
    set:
      istio.enabled: true
      istio.virtualService.gateways:
        - istio-system/my-gateway
        - mesh
    asserts:
      - contains:
          path: spec.gateways
          content: istio-system/my-gateway
      - contains:
          path: spec.gateways
          content: mesh