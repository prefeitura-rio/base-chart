suite: test infisicalsecret
templates:
  - infisicalsecret.yaml
tests:
  - it: should not render when disabled
    set:
      infisicalSecret.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render with global.secretName
    set:
      global.secretName: my-app-secrets
      infisicalSecret.enabled: true
      infisicalSecret.projectSlug: my-project
      infisicalSecret.envSlug: prod
    asserts:
      - isKind:
          of: InfisicalSecret
      - equal:
          path: metadata.name
          value: my-app-secrets
      - equal:
          path: spec.managedKubeSecretReferences[0].secretName
          value: my-app-secrets

  - it: should prefer infisicalSecret.secretName over global.secretName
    set:
      global.secretName: global-secret
      infisicalSecret.enabled: true
      infisicalSecret.secretName: specific-secret
      infisicalSecret.projectSlug: my-project
      infisicalSecret.envSlug: prod
    asserts:
      - equal:
          path: metadata.name
          value: specific-secret

  - it: should have sync-wave -1 annotation
    set:
      global.secretName: my-secrets
      infisicalSecret.enabled: true
      infisicalSecret.projectSlug: my-project
      infisicalSecret.envSlug: prod
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-1"

  - it: should set projectSlug and envSlug correctly
    set:
      global.secretName: my-secrets
      infisicalSecret.enabled: true
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: staging
    asserts:
      - equal:
          path: spec.authentication.universalAuth.secretsScope.projectSlug
          value: my-proj
      - equal:
          path: spec.authentication.universalAuth.secretsScope.envSlug
          value: staging

  - it: should use custom secretsPath when specified
    set:
      global.secretName: my-secrets
      infisicalSecret.enabled: true
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
      infisicalSecret.secretsPath: "/app/secrets"
    asserts:
      - equal:
          path: spec.authentication.universalAuth.secretsScope.secretsPath
          value: "/app/secrets"

  - it: should default recursive to true
    set:
      global.secretName: my-secrets
      infisicalSecret.enabled: true
      infisicalSecret.projectSlug: my-proj
      infisicalSecret.envSlug: prod
    asserts:
      - equal:
          path: spec.authentication.universalAuth.secretsScope.recursive
          value: true
